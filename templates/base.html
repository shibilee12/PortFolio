<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Mini Projects{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body{margin:0;padding:0;background:#000;color:#fff}</style>
</head>
<body>
  <header class="d-flex justify-content-between align-items-center px-4 py-3" style="position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)">
    <a href="/" class="text-danger fw-bold fs-4 text-decoration-none">MiniFlix</a>
    <nav class="d-none d-md-flex gap-3">
      <a href="settings/" class="text-light text-decoration-none">Settings</a>
      <a href="homepage" class="text-light text-decoration-none">Home</a>
    </nav>
  </header>

  <main style="padding-top:76px">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
