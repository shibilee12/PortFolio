<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Sign Up - PsychoDoc</title>
    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        form {
            background: rgba(21, 27, 37, 0.85);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(21, 27, 37, 0.8);
            width: 320px;
        }
        h1 {
            color: #39a2db;
            margin-bottom: 1rem;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 0 8px #39a2db;
        }
        label {
            display: block;
            margin-top: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #58a6ffcc;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            border-radius: 6px;
            border: 1.5px solid #30363d;
            background: #161b22;
            color: #c9d1d9;
            font-size: 1rem;
        }
        input[type="submit"] {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.75rem;
            background: #39a2db;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            color: #0d1117;
            cursor: pointer;
            box-shadow: 0 4px 12px #39a2db88;
            transition: background-color 0.3s ease;
        }
        input[type="submit"]:hover {
            background: #58c0ff;
        }
        .errorlist {
            color: #f87171;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <h1>Create Account</h1>
        {{ form.non_field_errors }}
        {% for field in form %}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <div class="errorlist">{{ error }}</div>
            {% endfor %}
        {% endfor %}
        <input type="submit" value="Sign Up" />
    </form>
</body>
</html>
